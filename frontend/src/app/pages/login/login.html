<div class="login-container">

  <h2>Task Manager Login</h2>

  <input
    type="email"
    [(ngModel)]="email"
    placeholder="Email"
  >

  <br><br>

  <input
    type="password"
    [(ngModel)]="password"
    placeholder="Password"
  >

  <br><br>

  <button (click)="login()">
    Login
  </button>

</div>
